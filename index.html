<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026 世界盃推估器</title>
<meta name="description" content="2026 美加墨世界盃 48 強推估器：有效 Elo × Poisson × 蒙地卡羅，逐場勝負、比分與奪冠機率，可離線使用。">
<!-- PWA：可安裝於 Android / iPhone 主畫面、離線可用 -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1220">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="世界盃推估">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070d19; --bg2:#0f172a; 
  --card:rgba(22, 35, 60, 0.7); 
  --card2:rgba(39, 57, 92, 0.5); 
  --line:rgba(148, 163, 184, 0.12);
  --line-focus:#3b82f6;
  --txt:#f8fafc; --sub:#94a3b8; --green:#10b981; --gold:#f59e0b; --red:#ef4444;
  --blue:#3b82f6; --grey:#64748b; --orange:#f97316;
  --glass:rgba(15, 23, 42, 0.65);
  --shadow:0 8px 32px 0 rgba(0, 0, 0, 0.35);
  --glow:0 0 16px rgba(245, 158, 11, 0.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at top, #1e293b 0%, var(--bg) 100%);min-height:100vh;
  color:var(--txt);font-family:"Outfit","Plus Jakarta Sans","Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;font-size:15px;padding-bottom:80px;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
header{position:sticky;top:0;z-index:50;background:rgba(11,18,32,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 30px rgba(0,0,0,0.2)}
header h1{font-size:18px;font-weight:800;letter-spacing:1px;background:linear-gradient(135deg, var(--txt) 30%, var(--sub) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header h1 small{color:var(--gold);font-size:12px;margin-left:6px;font-weight:600;text-shadow:var(--glow);background:none;-webkit-text-fill-color:var(--gold);}
header .gear{margin-left:auto;background:var(--card2);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:6px 12px;cursor:pointer;font-size:14px;transition:all 0.2s ease;backdrop-filter:blur(8px);}
header .gear:hover{background:rgba(255,255,255,0.08);transform:translateY(-1px);border-color:var(--blue)}
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:rgba(11,18,32,0.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 30px rgba(0,0,0,0.3)}
.tabs button{flex:1;background:none;border:none;color:var(--sub);font-size:11px;cursor:pointer;
  padding:6px 2px;border-radius:12px;font-family:inherit;position:relative;transition:all 0.2s ease;}
.tabs button:hover{color:var(--txt);transform:translateY(-1px)}
.bdg{position:absolute;top:0;right:16%;background:var(--red);color:#fff;border-radius:9px;font-size:10px;padding:1px 5px;font-weight:700;box-shadow:0 2px 8px rgba(239,68,68,0.4)}
.tabs button .ico{display:block;font-size:20px;margin-bottom:2px;transition:transform 0.2s ease;}
.tabs button:hover .ico{transform:scale(1.1)}
.tabs button.on{color:var(--gold);background:rgba(251,191,36,.06);font-weight:700;}
main{max-width:860px;margin:0 auto;padding:14px}
.card{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);transition:transform 0.2s ease, border-color 0.2s ease;}
.card:hover{border-color:rgba(148, 163, 184, 0.22);}
.card h2{font-size:15px;color:var(--gold);margin-bottom:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;text-shadow:0 0 10px rgba(245,158,11,0.15)}
.hint{color:var(--sub);font-size:12px;line-height:1.7}
select,input[type=number],input[type=text]{background:rgba(15,23,42,0.8);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:8px 10px;font-size:14px;font-family:inherit;outline:none;transition:all 0.2s ease;}
select:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,0.2)}
button.btn{background:linear-gradient(135deg, #10b981 0%, #059669 100%);color:#022c22;border:none;border-radius:10px;padding:9px 16px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);box-shadow:0 4px 12px rgba(16, 185, 129, 0.2);}
button.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(16, 185, 129, 0.35);filter:brightness(1.08);}
button.btn:active{transform:translateY(1px);}
button.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line);font-weight:600;box-shadow:none;}
button.btn.sec:hover{background:rgba(255,255,255,0.08);border-color:var(--blue);box-shadow:none;}
button.btn.sec.on{background:rgba(251,191,36,0.15);color:var(--gold);border-color:var(--gold);box-shadow:var(--glow);}
button.btn.warn{background:linear-gradient(135deg, #ef4444 0%, #dc2626 100%);color:#fff;box-shadow:0 4px 12px rgba(239, 68, 68, 0.2)}
button.btn.warn:hover{box-shadow:0 6px 16px rgba(239, 68, 68, 0.35);}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.vsbox{display:grid;grid-template-columns:1fr 48px 1fr;gap:10px;align-items:center}
.vsbox select{width:100%}
.swap{background:var(--card2);border:1px solid var(--line);color:var(--gold);border-radius:10px;
  padding:8px 0;cursor:pointer;font-size:16px;transition:all 0.2s ease;}
.swap:hover{background:rgba(255,255,255,0.08);transform:rotate(180deg);border-color:var(--gold)}
.probbar{display:flex;height:34px;border-radius:10px;overflow:hidden;margin:12px 0 6px;font-size:13px;font-weight:800;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3)}
.probbar div{display:flex;align-items:center;justify-content:center;min-width:34px;color:#fff;white-space:nowrap;transition:flex 0.3s ease-in-out;}
.pb-w{background:linear-gradient(135deg, #10b981 0%, #059669 100%);color:#022c22}
.pb-d{background:linear-gradient(135deg, #64748b 0%, #475569 100%);color:#fff}
.pb-l{background:linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);color:#fff}
.problab{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:8px}
.bigvs{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;text-align:center;margin:6px 0}
.bigvs .tn{font-size:18px;font-weight:800;letter-spacing:0.5px}
.bigvs .xg{font-size:28px;font-weight:800;color:var(--gold);text-shadow:var(--glow)}
.bigvs .sub2{font-size:11px;color:var(--sub);text-transform:uppercase}
.breakdown{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.bd{background:rgba(15, 23, 42, 0.65);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:12px}
.bd b{display:block;margin-bottom:8px;font-size:13px;color:var(--gold)}
.bd .li{display:flex;justify-content:space-between;color:var(--sub);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.bd .li:last-of-type{border-bottom:none}
.bd .li span:last-child{font-variant-numeric:tabular-nums;font-weight:600}
.bd .li.tot{color:var(--gold);font-weight:700;border-top:1px dashed var(--line);margin-top:6px;padding-top:6px}
.pos{color:var(--green)} .neg{color:var(--red)}
table.score{border-collapse:collapse;margin:6px auto;font-size:11px;border-radius:8px;overflow:hidden;box-shadow:var(--shadow)}
table.score td,table.score th{width:38px;height:32px;text-align:center;border:1px solid var(--line);font-variant-numeric:tabular-nums}
table.score th{color:var(--sub);background:rgba(15, 23, 42, 0.85);font-weight:700}
.toplist{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.toplist span{background:rgba(15, 23, 42, 0.65);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:13px}
.toplist b{color:var(--gold)}
.gfilter{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px}
.gfilter button{background:var(--card);border:1px solid var(--line);color:var(--sub);border-radius:8px;
  padding:6px 12px;cursor:pointer;font-size:13px;flex-shrink:0;font-family:inherit;transition:all 0.2s ease;}
.gfilter button:hover{color:var(--txt);background:var(--card2)}
.gfilter button.on{background:var(--gold);color:#3a2c00;border-color:var(--gold);font-weight:800;box-shadow:var(--glow)}
.match{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.match .top{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:8px;gap:6px;flex-wrap:wrap}
.match .tz{display:flex;flex-wrap:wrap;gap:3px 12px;font-size:11px;color:var(--sub);margin-bottom:8px}
.match .tz span{white-space:nowrap}
.match .tz b{color:var(--txt);font-weight:600}
.match .tz .tw b{color:var(--gold)}
.match .mid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.match .tA{text-align:right;font-weight:700}.match .tB{text-align:left;font-weight:700}
.match .sc{display:flex;gap:4px;align-items:center}
.match .sc input{width:40px;text-align:center;padding:5px 2px;font-weight:700;border-radius:6px;}
.match input.done{border-color:var(--green);color:var(--green);background:rgba(16,185,129,0.08)}
.minibar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:10px}
.minibar div:nth-child(1){background:var(--green)}.minibar div:nth-child(2){background:var(--grey)}.minibar div:nth-child(3){background:var(--blue)}
.match .pr{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:4px}
.match .use{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:2px 0;font-family:inherit;transition:opacity 0.2s;}
.match .use:hover{opacity:0.8}
.match .wx{background:none;border:none;color:var(--orange);font-size:12px;cursor:pointer;padding:2px 0 2px 12px;font-family:inherit;transition:opacity 0.2s;}
.match .wx:hover{opacity:0.8}
.wxr{font-size:11px;color:var(--orange);margin-left:8px}
.vtag{font-size:10px;background:rgba(249,115,22,0.15);color:var(--orange);border-radius:5px;padding:1px 5px}
.vtag.roof{background:rgba(59,130,246,0.15);color:var(--blue)}
.tgroup{margin-bottom:16px}
.tgroup h3{font-size:14px;color:var(--gold);margin:4px 2px 10px;letter-spacing:0.5px}
.trow{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);transition:all 0.2s;}
.trow .head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.trow .head .nm{font-weight:700;flex:1}
.trow .head .elo{font-variant-numeric:tabular-nums;font-size:14px;color:var(--gold);font-weight:800;text-shadow:var(--glow)}
.trow .head .delta{font-size:11px;margin-left:4px;font-weight:600}
.trow .body{border-top:1px solid var(--line);padding:14px;background:rgba(15, 23, 42, 0.45)}
.prow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px}
.prow:last-of-type{border-bottom:none}
.prow .pn{flex:1;font-weight:600}
.prow .pp{color:var(--sub);font-size:11px;width:28px}
.prow .pw{color:var(--gold);font-size:12px;width:42px;text-align:right}
.prow select{font-size:12px;padding:4px 6px}
.prow.st3 .pn{color:var(--red);text-decoration:line-through;opacity:0.6}
.prow.st1 .pn{color:var(--orange)}
.prow.st2 .pn{color:var(--green)}
.traits{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0;font-size:12px;display:flex;flex-direction:column;gap:6px}
.traits .tl{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:3px 0;color:var(--sub)}
.traits select,.traits input{width:90px;font-size:12px;padding:4px 6px}
.newsitem{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.newsitem.off{opacity:.45}
.newsitem .nt{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.newsitem .nt b{flex:1;font-size:14px;font-weight:700}
.newsitem .nd{font-size:12px;color:var(--sub);line-height:1.6}
.newsitem .nc{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--sub)}
.newsitem .nc input[type=number]{width:64px}
.newsitem .del{margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-family:inherit}
.tagD{font-size:12px;font-weight:800;padding:2px 8px;border-radius:6px;font-variant-numeric:tabular-nums}
.tagD.pos{background:rgba(16,185,129,0.15);color:var(--green)}
.tagD.neg{background:rgba(239,68,68,0.15);color:var(--red)}
.switch{position:relative;width:38px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch i{position:absolute;inset:0;background:var(--grey);border-radius:22px;cursor:pointer;transition:.2s}
.switch i:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+i{background:var(--green)}
.switch input:checked+i:before{transform:translateX(16px)}
table.sim{width:100%;border-collapse:collapse;font-size:12px}
table.sim th{color:var(--sub);font-weight:700;padding:8px 4px;text-align:right;border-bottom:1px solid var(--line)}
table.sim th:first-child,table.sim td:first-child{text-align:left}
table.sim td{padding:8px 4px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
table.sim td.ch{color:var(--gold);font-weight:800}
table.sim td.mk{color:var(--blue)}
.lup{background:rgba(15,23,42,0.8);border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px;font-size:11px;color:var(--sub);line-height:1.7}
.lup b{color:var(--txt)}
.chip{display:inline-block;border-radius:6px;padding:3px 8px;font-size:11px;margin:3px 3px 0 0;cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--txt);transition:all 0.15s ease;}
.chip:hover{background:rgba(255,255,255,0.08);border-color:var(--blue)}
.chip.red{color:var(--red);border-color:rgba(239,68,68,0.4)}
.chip.red:hover{background:rgba(239,68,68,0.1)}
.chip.org{color:var(--orange);border-color:rgba(249,115,22,0.4)}
.chip.org:hover{background:rgba(249,115,22,0.1)}
.chip.grn{color:var(--green);border-color:rgba(16,185,129,0.4);cursor:default}
.chip.grn:hover{background:none}
.pitem{background:rgba(15,23,42,0.6);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px;font-size:12px;box-shadow:var(--shadow)}
.pitem .ph{font-weight:700;font-size:13px;margin-bottom:4px;color:var(--txt)}
.pitem .pd{color:var(--sub);line-height:1.6;margin-bottom:8px}
.pitem .pc{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--sub)}
.pitem select{max-width:150px;font-size:12px;padding:4px 6px}
.pitem input{width:60px;font-size:12px;padding:4px 6px}
.bk-wrap{overflow:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;position:relative}
.bk{position:relative}
.bk svg{position:absolute;inset:0;pointer-events:none}
.bkm{position:absolute;background:rgba(15, 23, 42, 0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:border-color 0.2s;}
.bkm:hover{border-color:rgba(245, 158, 11, 0.45);}
.bkm .bkh{font-size:9px;color:var(--sub);padding:2px 8px;background:rgba(39,57,92,0.6);letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;height:16px;line-height:14px;font-weight:700}
.bkt{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:0 8px;height:24px;cursor:pointer;white-space:nowrap;font-size:11px;transition:all 0.15s ease;}
.bkt:hover{background:rgba(255,255,255,0.04)}
.bkt+.bkt{border-top:1px dashed var(--line)}
.bkt.win{background:rgba(16,185,129,0.12);font-weight:700;color:#34d399}
.bkt.lose{opacity:.45}
.bkt .pcv{color:var(--sub);font-size:10px;font-variant-numeric:tabular-nums;font-weight:600}
.bkt.win .pcv{color:#34d399}
.bklab{position:absolute;color:var(--gold);font-weight:800;font-size:11px;text-align:center;letter-spacing:0.5px;text-transform:uppercase}
.bkchamp{position:absolute;border:1.5px solid var(--gold);border-radius:12px;background:rgba(251,191,36,0.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);text-align:center;padding:6px 4px;box-shadow:0 0 20px rgba(251,191,36,0.18)}
.bkchamp .t{font-size:20px;line-height:24px}
.bkchamp .n{font-size:13px;font-weight:800;color:var(--gold);white-space:nowrap}
.flow{display:flex;align-items:stretch;gap:8px;overflow-x:auto;padding:4px 0}
.flow .step{background:rgba(15,23,42,0.6);border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-width:100px;flex-shrink:0;text-align:center;box-shadow:var(--shadow)}
.flow .step b{display:block;font-size:13px;color:var(--gold);margin-bottom:4px}
.flow .step small{color:var(--sub);font-size:10px;line-height:1.4;display:block}
.flow .arr{display:flex;align-items:center;color:var(--sub);font-size:16px;flex-shrink:0}
.mf{border-left:3px solid var(--blue);padding:8px 0 8px 12px;margin-bottom:10px;background:rgba(255,255,255,0.01)}
.mf b{font-size:14px;color:var(--txt)}
.mf .form{color:var(--gold);font-size:12px;font-variant-numeric:tabular-nums;margin:3px 0;font-weight:600}
.mf .src{color:var(--sub);font-size:11px;line-height:1.6}
.mf .src em{color:var(--green);font-style:normal}
.srcgrid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12px;color:var(--sub)}
.srcgrid b{color:var(--txt);white-space:nowrap}
.calib{display:flex;gap:10px;flex-wrap:wrap;font-size:12px}
.calib .cc{flex:1;min-width:130px;background:rgba(15,23,42,0.6);border:1px solid var(--line);border-radius:12px;padding:10px;box-shadow:var(--shadow)}
.calib .cc .tm{display:flex;justify-content:space-between;padding:3px 0;color:var(--sub);border-bottom:1px solid rgba(255,255,255,0.02)}
.calib .cc .tm:last-of-type{border-bottom:none}
.calib .cc .tm b{color:var(--txt)}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:86px;background:rgba(16,185,129,0.95);color:#022c22;
  font-weight:700;padding:10px 20px;border-radius:12px;z-index:99;opacity:0;pointer-events:none;transition:opacity .3s;font-size:13px;white-space:nowrap;box-shadow:0 8px 24px rgba(16,185,129,0.3)}
#toast.show{opacity:1}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .box{background:rgba(22, 35, 60, 0.95);border:1px solid var(--line);border-radius:20px;padding:20px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,0.5)}
.modal .box h2{color:var(--gold);font-size:17px;margin-bottom:16px;font-weight:800;letter-spacing:0.5px}
.set{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}

<body>
<header>
  <h1>⚽ 2026 世界盃推估器<small>美加墨 48 強 · v4.4</small></h1>
  <button class="gear" onclick="openSettings()">⚙️ 設定</button>
</header>
<main id="main"></main>
<nav class="tabs" id="tabs"></nav>

<div class="modal" id="modal"><div class="box" id="modalBox"></div></div>

<script src="世界盃資料.js" charset="utf-8"></script>
<script>
'use strict';
/* 內建資料已移至 世界盃資料.js（於上方先行載入）；以下為程式邏輯。 */
const STORE_KEY='wc2026_predictor_v2';

const SIM_WORKER_CODE = `
self.onmessage = function(e) {
  const { TEAMS, MATCHES, VENUES, HIGHALT_List, DIASPORA, KO_DEF, T_SLOTS, ROUND_MS, KO_INFO, S, eff, pkr, gkq, attArr, defArr, N } = e.data;
  const HIGHALT = new Set(HIGHALT_List);
  const st = TEAMS.map(() => ({ q32: 0, q16: 0, q8: 0, q4: 0, fin: 0, champ: 0 }));
  const groups = "ABCDEFGHIJKL".split('');
  
  const NSD = S.settings.simNoise != null ? S.settings.simNoise : 45;
  const rho = S.settings.drawBoost || 1.2;
  const tg = S.settings.totalGoals;
  const eloScale = S.settings.eloScale || 600;
  const homeAdv = S.settings.homeAdv || 50;
  const altSlope = S.settings.altSlope != null ? S.settings.altSlope : 43;
  const diasporaAdv = S.settings.diasporaAdv != null ? S.settings.diasporaAdv : 24;
  const drawCloseness = S.settings.drawCloseness || 350;
  const pkHistW = S.settings.pkHistW != null ? S.settings.pkHistW : 0.10;
  const pkGKW = S.settings.pkGKW != null ? S.settings.pkGKW : 0.20;
  const pkStrW = Math.max(0, 1 - pkHistW - pkGKW);
  const styleW = S.settings.styleW != null ? S.settings.styleW : 0.5;
  const clampS = x => Math.max(0.7, Math.min(1.4, Math.pow(x, styleW)));
  const styleMul = (a, b) => { if(!styleW) return [1,1]; const tempo=(attArr[a]*defArr[b]+attArr[b]*defArr[a])/2; const t=clampS(tempo); return [t,t]; };
  
  const gauss = () => {
    let u = 0, v = 0;
    while (!u) u = Math.random();
    while (!v) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  };
  
  const matchAdv = (ti, vi) => {
    const v = VENUES[vi];
    const home = TEAMS[ti][6] && TEAMS[ti][6] === v[1] ? homeAdv : 0;
    const alt = (v[4] > 1200 && !HIGHALT.has(ti)) ? -Math.round(altSlope * (v[4] - 1200) / 1000) : 0;
    let dia = 0;
    const w = DIASPORA[ti];
    if (w && v[1] !== TEAMS[ti][6]) {
      if (v[1] === 'US') dia = Math.round(diasporaAdv * w);
      else if (v[1] === 'CA') dia = Math.round(diasporaAdv * w * 0.5);
    }
    return home + alt + dia;
  };
  
  const pa = new Float64Array(9);
  const pb = new Float64Array(9);
  const simMatch = (eA, eB, sA, sB) => {
    sA = sA || 1; sB = sB || 1;
    const we = 1 / (1 + Math.pow(10, -(eA - eB) / eloScale));
    const weC = Math.min(0.94, Math.max(0.06, we)); // 同 predict/fallback：夾 we 以守恆總進球（兩隊 λ 相加≈totalGoals）
    const lA = tg * weC * sA;
    const lB = tg * (1 - weC) * sB;
    const close = Math.exp(-Math.abs(eA - eB) / drawCloseness);
    const rhoEff = 1 + (rho - 1) * close;

    pa[0] = Math.exp(-lA);
    pb[0] = Math.exp(-lB);
    for (let k = 1; k < 9; k++) {
      pa[k] = (pa[k - 1] * lA) / k;
      pb[k] = (pb[k - 1] * lB) / k;
    }

    let tot = 0;
    for (let i = 0; i < 9; i++) {
      for (let j = 0; j < 9; j++) {
        tot += pa[i] * pb[j] * (i === j ? rhoEff : 1);
      }
    }

    let u = Math.random() * tot;
    for (let i = 0; i < 9; i++) {
      for (let j = 0; j < 9; j++) {
        u -= pa[i] * pb[j] * (i === j ? rhoEff : 1);
        if (u <= 0) return [i, j];
      }
    }
    return [0, 0];
  };
  
  function assignThirds(groups){
    const slots=Object.keys(T_SLOTS), assign={};
    function bt(rs,rg){
      if(!rs.length)return true;
      let bi=0,bc=99;
      rs.forEach((s,i)=>{const c=rg.filter(g=>T_SLOTS[s].includes(g)).length;if(c<bc){bc=c;bi=i;}});
      const s=rs[bi], cands=rg.filter(g=>T_SLOTS[s].includes(g)).sort();
      for(const g of cands){ assign[s]=g; if(bt(rs.filter((x,i)=>i!==bi),rg.filter(x=>x!==g)))return true; delete assign[s]; }
      return false;
    }
    if(!bt(slots,groups.slice())){ const left=groups.slice(); slots.forEach(s=>{ if(!assign[s])assign[s]=left.shift(); }); }
    return assign;
  }
  
  function buildR32(wMap,rMap,tMap){
    const ta=assignThirds(Object.keys(tMap));
    return ROUND_MS[0].map(m=>{
      const d=KO_DEF[m];
      const pick=c=> c==='T' ? tMap[ta[m]] : (c[0]==='W'?wMap[c[1]]:rMap[c[1]]);
      return [pick(d[0]),pick(d[1]),m];
    });
  }
  
  function sortTiedH2H(tied, simScores, matches, ne) {
    if (tied.length <= 1) return tied;
    const h2h = {};
    tied.forEach(t => h2h[t] = { pts: 0, gd: 0, gf: 0 });
    matches.forEach((m, idx) => {
      const tA = m[2], tB = m[3];
      if (tied.includes(tA) && tied.includes(tB)) {
        const res = simScores[idx];
        if (res) {
          const gh = res[0], ga = res[1];
          h2h[tA].gf += gh; h2h[tB].gf += ga;
          h2h[tA].gd += (gh - ga); h2h[tB].gd += (ga - gh);
          if (gh > ga) h2h[tA].pts += 3;
          else if (ga > gh) h2h[tB].pts += 3;
          else { h2h[tA].pts += 1; h2h[tB].pts += 1; }
        }
      }
    });
    tied.sort((a, b) => {
      if (h2h[b].pts !== h2h[a].pts) return h2h[b].pts - h2h[a].pts;
      if (h2h[b].gd !== h2h[a].gd) return h2h[b].gd - h2h[a].gd;
      if (h2h[b].gf !== h2h[a].gf) return h2h[b].gf - h2h[a].gf;
      return 0;
    });
    let result = [];
    let start = 0;
    while (start < tied.length) {
      let end = start + 1;
      while (end < tied.length &&
             h2h[tied[start]].pts === h2h[tied[end]].pts &&
             h2h[tied[start]].gd === h2h[tied[end]].gd &&
             h2h[tied[start]].gf === h2h[tied[end]].gf) {
        end++;
      }
      let subTied = tied.slice(start, end);
      if (subTied.length > 1) {
        if (subTied.length < tied.length) {
          subTied = sortTiedH2H(subTied, simScores, matches, ne);
        } else {
          subTied.sort((a, b) => ne[b] - ne[a] || Math.random() - 0.5);
        }
      }
      result = result.concat(subTied);
      start = end;
    }
    return result;
  }

  function sortGroup(teamIndices, rows, simScores, matches, ne) {
    teamIndices.sort((a, b) => {
      const rA = rows[a], rB = rows[b];
      if (rB.pts !== rA.pts) return rB.pts - rA.pts;
      if (rB.gd !== rA.gd) return rB.gd - rA.gd;
      if (rB.gf !== rA.gf) return rB.gf - rA.gf;
      return 0;
    });
    let result = [];
    let start = 0;
    while (start < teamIndices.length) {
      let end = start + 1;
      while (end < teamIndices.length &&
             rows[teamIndices[start]].pts === rows[teamIndices[end]].pts &&
             rows[teamIndices[start]].gd === rows[teamIndices[end]].gd &&
             rows[teamIndices[start]].gf === rows[teamIndices[end]].gf) {
        end++;
      }
      let tied = teamIndices.slice(start, end);
      if (tied.length > 1) {
        tied = sortTiedH2H(tied, simScores, matches, ne);
      }
      result = result.concat(tied);
      start = end;
    }
    return result;
  }
  
  for (let s = 0; s < N; s++) {
    const ne = eff.map(e => NSD ? e + gauss() * NSD : e);
    const simScores = new Array(MATCHES.length);
    const rows = TEAMS.map((t, i) => ({ i, pts: 0, gd: 0, gf: 0 }));
    
    MATCHES.forEach((m, idx) => {
      const res = S.results[idx];
      let gh, ga;
      if (res && !isNaN(res[0]) && !isNaN(res[1])) {
        gh = res[0]; ga = res[1];
      } else {
        const eA = ne[m[2]] + matchAdv(m[2], m[4]);
        const eB = ne[m[3]] + matchAdv(m[3], m[4]);
        const sm = styleMul(m[2], m[3]);
        const sc = simMatch(eA, eB, sm[0], sm[1]);
        gh = sc[0]; ga = sc[1];
      }
      simScores[idx] = [gh, ga];
      rows[m[2]].gf += gh;
      rows[m[3]].gf += ga;
      rows[m[2]].gd += (gh - ga);
      rows[m[3]].gd += (ga - gh);
      if (gh > ga) {
        rows[m[2]].pts += 3;
      } else if (ga > gh) {
        rows[m[3]].pts += 3;
      } else {
        rows[m[2]].pts += 1;
        rows[m[3]].pts += 1;
      }
    });
    
    const wMap = {}, rMap = {}, tArr = [];
    groups.forEach(g => {
      const teamIdxs = [];
      TEAMS.forEach((t, i) => { if (t[2] === g) teamIdxs.push(i); });
      const sorted = sortGroup(teamIdxs, rows, simScores, MATCHES, ne);
      wMap[g] = sorted[0];
      rMap[g] = sorted[1];
      tArr.push(rows[sorted[2]]);
    });
    
    tArr.sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      if (b.gd !== a.gd) return b.gd - a.gd;
      if (b.gf !== a.gf) return b.gf - a.gf;
      return ne[b.i] - ne[a.i] || Math.random() - 0.5;
    });
    
    const tMap = {};
    tArr.slice(0, 8).forEach(r => {
      tMap[TEAMS[r.i][2]] = r.i;
    });
    
    const fullFix = ROUND_MS[0].every(x => S.koFix[x]);
    let cur = buildR32(wMap, rMap, tMap).map(p => {
      const f = fullFix ? S.koFix[p[2]] : null;
      return f ? [f[0], f[1], p[2]] : p;
    });
    
    cur.forEach(p => {
      st[p[0]].q32++;
      st[p[1]].q32++;
    });
    
    const koWin = (x, y, m) => {
      const fx = S.koRes[m];
      if (fx === x || fx === y) return fx;
      const vi = KO_INFO[m][1];
      const eX = ne[x] + matchAdv(x, vi);
      const eY = ne[y] + matchAdv(y, vi);
      const sm = styleMul(x, y);
      const sc = simMatch(eX, eY, sm[0], sm[1]);
      if (sc[0] > sc[1]) return x;
      if (sc[1] > sc[0]) return y;
      const we = 1 / (1 + Math.pow(10, -(eX - eY) / eloScale));
      const pHist = Math.max(0.25, Math.min(0.75, 0.5 + (pkr[x] - pkr[y]) * 0.6));
      const pGK = Math.max(0.25, Math.min(0.75, 0.5 + (gkq[x] - gkq[y]) * 0.09));
      return Math.random() < (pkStrW * we + pkGKW * pGK + pkHistW * pHist) ? x : y;
    };
    
    const stages = ['q16', 'q8', 'q4', 'fin', 'champ'];
    for (let r = 0; r < 5; r++) {
      const wn = cur.map(p => koWin(p[0], p[1], p[2]));
      wn.forEach(i => st[i][stages[r]]++);
      if (r === 4) break;
      const nm = ROUND_MS[r + 1], nxt = [];
      for (let i = 0; i < wn.length; i += 2) {
        nxt.push([wn[i], wn[i + 1], nm[i / 2]]);
      }
      cur = nxt;
    }
    
    if ((s + 1) % Math.ceil(N / 10) === 0 || s === N - 1) {
      self.postMessage({ type: 'progress', progress: Math.round((s + 1) / N * 100) });
    }
  }
  self.postMessage({ type: 'done', result: st });
};
`;


/* ================= 狀態 ================= */
let S=null;
function defaultState(){
  return {
    adj:{},                 // teamIdx -> 手動 Elo 調整
    pstate:{},              // teamIdx -> {playerIdx: 0正常|1低迷帶傷|2巔峰|3缺陣}
    customPlayers:{},       // teamIdx -> [[名,位置,權重],...]
    traits:{},              // teamIdx -> [韌性,團結,中場]（覆寫預設用）
    odds:{},                // teamIdx -> 市場奪冠賠率（小數制）
    news:DEF_NEWS.map((n,i)=>({id:'d'+i,t:n[0],title:n[1],detail:n[2],delta:n[3],on:true,custom:false})),
    results:JSON.parse(JSON.stringify(DEF_RESULTS)),
    settings:{homeAdv:50,perWeight:8,totalGoals:2.6,sims:5000,altSlope:43,drawBoost:1.2,drawCloseness:350,simNoise:45,kFactor:40,eloScale:600,mvWeight:0.3,diasporaAdv:24,pkHistW:0.10,pkGKW:0.20,styleW:0.5},
    pA:36,pB:32,pV:'auto',restA:'',restB:'',
    lastNewsTs:0,seenNews:[],pending:[],lastScoreTs:0,
    koFix:{},               // 場次編號 -> [隊A,隊B] 官方對陣（更新比分時自動抓）
    koRes:{}                // 場次編號 -> 勝者隊idx（官方賽果）
  };
}
// 一筆賽果只有「兩格都是有效數字」才算數；半填(NaN)經 JSON.stringify 會變 null，必須擋掉避免被誤判為 0:0 幻影賽果
function validRes(r){ return Array.isArray(r) && typeof r[0]==='number' && !isNaN(r[0]) && typeof r[1]==='number' && !isNaN(r[1]); }
function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){ S=JSON.parse(raw);
      S.settings=Object.assign({homeAdv:50,perWeight:8,totalGoals:2.6,sims:5000,altSlope:43,drawBoost:1.2,drawCloseness:350,simNoise:45,kFactor:40,eloScale:600,mvWeight:0.3,diasporaAdv:24,pkHistW:0.10,pkGKW:0.20,styleW:0.5},S.settings||{});
      ['adj','pstate','customPlayers','traits','odds','results','koFix','koRes'].forEach(k=>{ if(!S[k])S[k]={}; });
      for(const k in S.results){ if(!validRes(S.results[k])) delete S.results[k]; } // 清掉半填/損壞(含舊版寫入的 [x,null])的賽果，避免幻影賽果污染積分榜與模擬
      if(!Array.isArray(S.news))S.news=defaultState().news;
      else S.news=S.news.filter(n=>n&&typeof n.t==='number'&&n.t>=0&&n.t<TEAMS.length); // 丟掉隊伍索引越界的新聞，避免新聞頁渲染崩潰
      if(S.pV===undefined)S.pV='auto';
      if(!Array.isArray(S.seenNews))S.seenNews=[];
      if(!Array.isArray(S.pending))S.pending=[];
      if(!S.lastNewsTs)S.lastNewsTs=0;
      if(!S.lastScoreTs)S.lastScoreTs=0;
      for(const k in DEF_RESULTS){ if(!S.results[k])S.results[k]=DEF_RESULTS[k].slice(); } // 補入內建的真實賽果（不覆寫已輸入值）
      return; }
  }catch(e){}
  S=defaultState();
  try{ // 從 v1 移轉舊資料
    const old=JSON.parse(localStorage.getItem('wc2026_predictor_v1'));
    if(old){
      S.adj=old.adj||{}; S.customPlayers=old.customPlayers||{};
      if(Array.isArray(old.news))S.news=old.news;
      if(old.results)S.results=old.results;
      Object.assign(S.settings,old.settings||{});
      if(old.out)Object.keys(old.out).forEach(i=>{S.pstate[i]={};(old.out[i]||[]).forEach(pi=>S.pstate[i][pi]=3);});
      if(old.pA!=null)S.pA=old.pA; if(old.pB!=null)S.pB=old.pB;
    }
  }catch(e){}
  save();
}
function save(){ DYN=null; try{localStorage.setItem(STORE_KEY,JSON.stringify(S));}catch(e){} }

/* ================= 模型 ================= */
function playersOf(i){ return (DEF_PLAYERS[i]||[]).concat(S.customPlayers[i]||[]); }
function traitsOf(i){ return S.traits[i]||DEF_TRAITS[i]||[3,3,3]; }
function ageAdj(i){
  const a=AGES[i];
  let d=0;
  if(a>28.5)d=-(a-28.5)*8;          // 老化：疲勞與恢復風險
  else if(a<25.5)d=-(25.5-a)*6;     // 太年輕：大賽經驗不足
  return Math.max(-15,Math.round(d));
}
function pkRate(i){ const r=PK[i]; return r?(r[0]+1)/(r[0]+r[1]+2):0.5; } // 平滑後 PK 勝率
// 市場身價 → 「身價 Elo」：取對數後以 z-score 對齊 Elo 分布（自動校準，學界最強單一變數）
let MVSTATS=null;
function mvStats(){
  if(MVSTATS)return MVSTATS;
  const el=TEAMS.map(t=>t[3]), lv=MV.map(v=>Math.log(v));
  const mean=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const sd=(a,m)=>Math.sqrt(mean(a.map(x=>(x-m)*(x-m))));
  const eM=mean(el),lM=mean(lv);
  MVSTATS={eM,eS:sd(el,eM),lM,lS:sd(lv,lM)}; return MVSTATS;
}
function valueElo(i){ const s=mvStats(); return s.eM+(Math.log(MV[i])-s.lM)/s.lS*s.eS; }
function mvAdj(i){ const w=S.settings.mvWeight; return w?Math.round(w*(valueElo(i)-TEAMS[i][3])):0; }
let DYN=null;
function dynElo(){ // 賽中動態：依「實際 vs 預期」逐場調整 Elo（同 eloratings.net 的 K×進球差倍率）
  const adj=new Array(TEAMS.length).fill(0);
  const K=S.settings.kFactor!=null?S.settings.kFactor:40;
  if(!K)return adj;
  MATCHES.forEach((m,idx)=>{
    const res=S.results[idx]; if(!res||isNaN(res[0])||isNaN(res[1]))return;
    const eA=TEAMS[m[2]][3]+adj[m[2]]+matchAdv(m[2],m[4]);
    const eB=TEAMS[m[3]][3]+adj[m[3]]+matchAdv(m[3],m[4]);
    const we=1/(1+Math.pow(10,-(eA-eB)/(S.settings.eloScale||600))); // 與 predict() 同尺度（600），避免動態 Elo 偏離校準
    const sA=res[0]>res[1]?1:(res[0]<res[1]?0:0.5);
    const gd=Math.abs(res[0]-res[1]);
    const g=gd<=1?1:(gd===2?1.5:(11+gd)/8);
    adj[m[2]]+=K*g*(sA-we); adj[m[3]]-=K*g*(sA-we);
  });
  return adj;
}
function getDyn(){ if(!DYN)DYN=dynElo(); return DYN; }
function eloBreak(i){
  const base=TEAMS[i][3], adj=S.adj[i]||0, pw=S.settings.perWeight;
  let pAdj=0; const ps=playersOf(i), st=S.pstate[i]||{};
  ps.forEach((p,pi)=>{ const s=st[pi]||0, w=p[2]*pw;
    if(s===3)pAdj-=w; else if(s===1)pAdj-=w*0.5; else if(s===2)pAdj+=w*0.25; });
  pAdj=Math.round(pAdj);
  let news=0; S.news.forEach(n=>{ if(n.on&&n.t===i) news+=Number(n.delta)||0; });
  const tr=traitsOf(i);
  // 特質是 Elo 之外的主觀疊加，係數減半＋總上限 ±15，避免與 Elo 重複計分（v3.4 校準）
  let trait=Math.round((tr[0]-3)*2.5+(tr[1]-3)*2.5+(tr[2]-3)*3);
  trait=Math.max(-15,Math.min(15,trait));
  const age=ageAdj(i);
  const mv=mvAdj(i);
  const dyn=Math.round(getDyn()[i]);
  return {base,adj,pAdj,news,trait,age,mv,dyn,eff:base+adj+pAdj+news+trait+age+mv+dyn};
}
function effElo(i){ return eloBreak(i).eff; }
// 攻擊/防守風格指數：場均進球/失球正規化至均值 1.0；λ 乘 (att_攻×def_守)^γ（第 1 點）
let GFD=null;
function gfdStats(){ if(GFD)return GFD; const m=a=>a.reduce((x,y)=>x+y,0)/a.length; GFD={mf:m(GFPG),mg:m(GAPG)}; return GFD; }
function attOf(i){ return GFPG[i]/gfdStats().mf; }
function defOf(i){ return GAPG[i]/gfdStats().mg; }
function styleMul(a,b){ // 風格只影響「比賽節奏／總進球」，不動 Elo 決定的勝負傾向（避免與實力雙重計分而跑掉校準）
  const g=S.settings.styleW; if(!g)return [1,1];
  const tempo=(attOf(a)*defOf(b)+attOf(b)*defOf(a))/2; // 兩隊「攻×對手守漏」的平均，centered≈1
  const t=Math.max(0.7,Math.min(1.4,Math.pow(tempo,g)));
  return [t,t]; // 兩隊同乘 → 比分比例(勝率)不變、只改總進球規模
}
function gkQuality(i){ // 門將品質（取名單中 GK 的星級，缺則 3），轉成 0~1 傾向
  let w=3; (playersOf(i)||[]).forEach(p=>{ if(p[1]==='GK'&&p[2]>w)w=p[2]; });
  return w; // 1~5
}
// PK 晉級機率（第 3 點）：當前實力 70% + 門將品質 20% + PK 大戰史 10%（權重可調）
function pkProb(x,y,weX){
  const we=weX!=null?weX:0.5;
  const hist=S.settings.pkHistW!=null?S.settings.pkHistW:0.10;
  const gk=S.settings.pkGKW!=null?S.settings.pkGKW:0.20;
  const str=Math.max(0,1-hist-gk);
  const pHist=Math.max(0.25,Math.min(0.75,0.5+(pkRate(x)-pkRate(y))*0.6));
  const pGK=Math.max(0.25,Math.min(0.75,0.5+(gkQuality(x)-gkQuality(y))*0.09));
  return str*we + gk*pGK + hist*pHist;
}
function venueExtra(ti,vi){ // [主場加成, 高原懲罰, 僑民主場]
  const v=VENUES[vi];
  const home=TEAMS[ti][6]&&TEAMS[ti][6]===v[1]?S.settings.homeAdv:0;
  // 高原：海拔 1200m 以上線性懲罰（McSharry 0.5球/千米經移地訓練折減後）；墨/厄/哥免疫
  const slope=S.settings.altSlope!=null?S.settings.altSlope:43;
  const alt=(v[4]>1200&&!HIGHALT.has(ti))?-Math.round(slope*(v[4]-1200)/1000):0;
  // 僑民主場：拉美隊在美(全額)/加(半額)場館（非自家主辦國時）
  let dia=0; const w=DIASPORA[ti], dAdv=S.settings.diasporaAdv!=null?S.settings.diasporaAdv:24;
  if(w&&v[1]!==TEAMS[ti][6]){ if(v[1]==='US')dia=Math.round(dAdv*w); else if(v[1]==='CA')dia=Math.round(dAdv*w*0.5); }
  return [home,alt,dia];
}
function matchAdv(ti,vi){ const e=venueExtra(ti,vi); return e[0]+e[1]+e[2]; }
function fact(n){let f=1;for(let i=2;i<=n;i++)f*=i;return f;}
function pois(l,k){ return Math.exp(-l)*Math.pow(l,k)/fact(k); }
function predict(eA,eB,sA,sB){
  // sA/sB：風格乘數（攻擊×對手防守）^γ，預設 1＝關閉；由呼叫端依球隊攻防指數帶入（第 1 點）
  sA=sA||1; sB=sB||1;
  const dr=eA-eB;
  // 分母用 eloScale（預設 600，比標準 400 平緩）：書商單場勝率比純 Elo 換算保守，600 與市場最接近
  const we=1/(1+Math.pow(10,-dr/(S.settings.eloScale||600)));
  const tg=S.settings.totalGoals;
  // 夾住 we（而非各自對 λ 套絕對下限）以維持「兩隊期望進球相加≈總進球」守恆，避免實力懸殊場系統性高估總進球
  const weC=Math.min(0.94,Math.max(0.06,we));
  const lA=tg*weC*sA, lB=tg*(1-weC)*sB;
  const N=11,pa=[],pb=[];
  for(let k=0;k<N;k++){pa.push(pois(lA,k));pb.push(pois(lB,k));}
  // 動態平手修正：Poisson 對平局的低估在「勢均力敵」時最嚴重，故加成隨實力差淡出（第 2 點）
  const dBoost=S.settings.drawBoost||1.2;
  const close=Math.exp(-Math.abs(dr)/(S.settings.drawCloseness||350)); // 1=勢均力敵 → 0=一面倒
  const rho=1+(dBoost-1)*close;
  let pW=0,pD=0,pL=0; const M=[];
  for(let i=0;i<N;i++){M.push([]);for(let j=0;j<N;j++){let p=pa[i]*pb[j];if(i===j)p*=rho;M[i].push(p);
    if(i>j)pW+=p;else if(i===j)pD+=p;else pL+=p;}}
  const s=pW+pD+pL; pW/=s;pD/=s;pL/=s;
  for(let i=0;i<N;i++)for(let j=0;j<N;j++)M[i][j]/=s;
  return {dr,we,lA,lB,pW,pD,pL,M};
}
function samplePois(l){ const L=Math.exp(-l); let k=0,p=1; do{k++;p*=Math.random();}while(p>L); return k-1; }

const WDzh=['日','一','二','三','四','五','六'];
function zoneStr(iso,tz,wd){ // 把 UTC 開球時間換算到指定時區，回傳「M/D（週X）HH:MM」
  const d=new Date(iso); if(isNaN(d))return '';
  const p={}; new Intl.DateTimeFormat('en-GB',{timeZone:tz,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).formatToParts(d).forEach(x=>{if(x.type!=='literal')p[x.type]=x.value;});
  const w=wd?`（${WDzh[new Date(d.toLocaleString('en-US',{timeZone:tz})).getDay()]}）`:'';
  return `${+p.month}/${+p.day}${w} ${p.hour}:${p.minute}`;
}
function tzRow(iso){
  if(!iso)return '';
  return `<div class="tz">
    <span class="tw">🇹🇼 台灣 <b>${zoneStr(iso,'Asia/Taipei',1)}</b></span>
    <span>🇺🇸 美東 <b>${zoneStr(iso,'America/New_York',0)}</b></span>
    <span>🇪🇺 歐洲 <b>${zoneStr(iso,'Europe/Paris',0)}</b></span></div>`;
}

function setRes(idx,side,val){
  if(val===''){ delete S.results[idx]; save(); render(); return; } // 清空任一格→整場恢復為預測

async function updateKO(){ // 小組賽完賽後：抓官方 32 強對陣與淘汰賽賽果，逐場鎖定（回傳更新筆數）
  const ranges=['20260628-20260703','20260704-20260707','20260709-20260711','20260714-20260715','20260719'];
  let evs=[];
  for(const rg of ranges){
    try{
      const j=await(await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates='+rg)).json();
      evs=evs.concat(j.events||[]);
    }catch(e){}
  }
  if(!evs.length)return 0;
  const parsed=evs.map(e=>{
    const c=(e.competitions&&e.competitions[0])||{};
    const comp=c.competitors||[];
    const ids=comp.map(x=>ALIAS[norm(x.team&&x.team.displayName)]);
    if(ids.length!==2||ids.some(x=>x===undefined))return null;
    const done=(e.status&&e.status.type&&e.status.type.completed)===true;
    let win=null;
    if(done){ const w=comp.find(x=>x.winner); if(w)win=ALIAS[norm(w.team.displayName)]; }
    return {ids,done,win};
  }).filter(Boolean);
  if(!parsed.length)return 0;
  // 小組賽必須全部完賽，才能由真實名次對應官方槽位
  const wMap={},rMap={}; let groupsDone=true;
  "ABCDEFGHIJKL".split('').forEach(g=>{
    const tb=groupTable(g,false);
    if(tb.some(r=>r.pl<3))groupsDone=false;
    wMap[g]=tb[0].i; rMap[g]=tb[1].i;
  });
  if(!groupsDone)return 0;
  let n=0;
  ROUND_MS[0].forEach(m=>{ // R32：以 W/R 槽位錨定比對
    const d=KO_DEF[m];
    const anchor=d[0][0]==='W'?wMap[d[0][1]]:rMap[d[0][1]];
    const ev=parsed.find(p=>p.ids.includes(anchor)&&(d[1]==='T'||p.ids.includes(d[1][0]==='W'?wMap[d[1][1]]:rMap[d[1][1]])));
    if(ev){
      const other=ev.ids[0]===anchor?ev.ids[1]:ev.ids[0];
      if(!S.koFix[m]||S.koFix[m][0]!==anchor||S.koFix[m][1]!==other){S.koFix[m]=[anchor,other];n++;}
      if(ev.done&&ev.win!=null&&S.koRes[m]!==ev.win){S.koRes[m]=ev.win;n++;}
    }
  });
  for(let r=1;r<5;r++){ // 16強以後：由已知勝者串接
    const prev=ROUND_MS[r-1];
    ROUND_MS[r].forEach((m,i)=>{
      const f1=S.koRes[prev[2*i]], f2=S.koRes[prev[2*i+1]];
      if(f1==null||f2==null)return;
      if(!S.koFix[m]){S.koFix[m]=[f1,f2];n++;}
      const ev=parsed.find(p=>p.ids.includes(f1)&&p.ids.includes(f2));
      if(ev&&ev.done&&ev.win!=null&&S.koRes[m]!==ev.win){S.koRes[m]=ev.win;n++;}
    });
  }
  if(n)save();
  return n;
}

function sortTiedH2H(tied, simScores, matches, ne) {
  if (tied.length <= 1) return tied;
  const h2h = {};
  tied.forEach(t => h2h[t] = { pts: 0, gd: 0, gf: 0 });
  matches.forEach((m, idx) => {
    const tA = m[2], tB = m[3];
    if (tied.includes(tA) && tied.includes(tB)) {
      const res = simScores[idx];
      if (res && !isNaN(res[0]) && !isNaN(res[1])) {
        const gh = res[0], ga = res[1];
        h2h[tA].gf += gh; h2h[tB].gf += ga;
        h2h[tA].gd += (gh - ga); h2h[tB].gd += (ga - gh);
        if (gh > ga) h2h[tA].pts += 3;
        else if (ga > gh) h2h[tB].pts += 3;
        else { h2h[tA].pts += 1; h2h[tB].pts += 1; }
      }
    }
  });
  tied.sort((a, b) => {
    if (h2h[b].pts !== h2h[a].pts) return h2h[b].pts - h2h[a].pts;
    if (h2h[b].gd !== h2h[a].gd) return h2h[b].gd - h2h[a].gd;
    if (h2h[b].gf !== h2h[a].gf) return h2h[b].gf - h2h[a].gf;
    return 0;
  });
  let result = [];
  let start = 0;
  while (start < tied.length) {
    let end = start + 1;
    while (end < tied.length &&
           h2h[tied[start]].pts === h2h[tied[end]].pts &&
           h2h[tied[start]].gd === h2h[tied[end]].gd &&
           h2h[tied[start]].gf === h2h[tied[end]].gf) {
      end++;
    }
    let subTied = tied.slice(start, end);
    if (subTied.length > 1) {
      if (subTied.length < tied.length) {
        subTied = sortTiedH2H(subTied, simScores, matches, ne);
      } else {
        subTied.sort((a, b) => ne[b] - ne[a] || Math.random() - 0.5);
      }
    }
    result = result.concat(subTied);
    start = end;
  }
  return result;
}
function sortGroup(teamIndices, rows, simScores, matches, ne) {
  teamIndices.sort((a, b) => {
    const rA = rows[a], rB = rows[b];
    if (rB.pts !== rA.pts) return rB.pts - rA.pts;
    if (rB.gd !== rA.gd) return rB.gd - rA.gd;
    if (rB.gf !== rA.gf) return rB.gf - rA.gf;
    return 0;
  });
  let result = [];
  let start = 0;
  while (start < teamIndices.length) {
    let end = start + 1;
    while (end < teamIndices.length &&
           rows[teamIndices[start]].pts === rows[teamIndices[end]].pts &&
           rows[teamIndices[start]].gd === rows[teamIndices[end]].gd &&
           rows[teamIndices[start]].gf === rows[teamIndices[end]].gf) {
      end++;
    }
    let tied = teamIndices.slice(start, end);
    if (tied.length > 1) {
      tied = sortTiedH2H(tied, simScores, matches, ne);
    }
    result = result.concat(tied);
    start = end;
  }
  return result;
}
function groupTable(g,useExp){
  const rows={}; TEAMS.forEach((t,i)=>{ if(t[2]===g) rows[i]={i,pts:0,gd:0,gf:0,pl:0}; });
  MATCHES.forEach((m,idx)=>{
    if(m[1]!==g)return;
    const res=S.results[idx];
    if(res&&!isNaN(res[0])&&!isNaN(res[1])){
      rows[m[2]].pl++; rows[m[3]].pl++;
      rows[m[2]].gf+=res[0]; rows[m[3]].gf+=res[1];
      rows[m[2]].gd+=res[0]-res[1]; rows[m[3]].gd+=res[1]-res[0];
      if(res[0]>res[1])rows[m[2]].pts+=3; else if(res[0]<res[1])rows[m[3]].pts+=3; else {rows[m[2]].pts++;rows[m[3]].pts++;}
    } else if(useExp){
      const sm=styleMul(m[2],m[3]);
      const r=predict(effElo(m[2])+matchAdv(m[2],m[4]), effElo(m[3])+matchAdv(m[3],m[4]),sm[0],sm[1]);
      rows[m[2]].pts+=3*r.pW+r.pD; rows[m[3]].pts+=3*r.pL+r.pD;
    }
  });
  const teamIndices = Object.keys(rows).map(Number);
  const ne = TEAMS.map((t, i) => effElo(i));
  const sortedIndices = sortGroup(teamIndices, rows, S.results, MATCHES, ne);
  return sortedIndices.map(idx => rows[idx]);
}

        if(ps.length===0)h+=`<div class="hint">尚無球員資料，可於下方新增。</div>`;
        ps.forEach((p,pi)=>{
          const s=st[pi]||0;
          h+=`<div class="prow st${s}">
            <span class="pp">${p[1]}</span><span class="pn">${p[0]}</span>
            <span class="pw">${'★'.repeat(p[2])}</span>
            <select onchange="setPState(${i},${pi},+this.value)">${STATE_NAMES.map((nm,si)=>`<option value="${si}" ${s===si?'selected':''}>${nm}</option>`).join('')}</select>
          </div>`;
        });
        h+=`<div class="addform" style="grid-template-columns:1fr 70px 64px auto">
          <input type="text" id="np_n" placeholder="新增球員姓名">

          <select id="np_w"><option value="3">★3</option><option value="4">★4</option><option value="5">★5</option><option value="2">★2</option><option value="1">★1</option></select>
          <button class="btn sec" onclick="addPlayer(${i})">＋</button>
        </div></div>`;
      }
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}
function setPState(i,pi,s){

}
function setTrait(i,k,v){

}
function setOdds(i,v){

function addPlayer(i){

/* ---------- 每日情報爬取（ESPN，免金鑰、CORS 放行）---------- */
function suggestDelta(t){
  t=t.toLowerCase();
  // 先看「傷癒回歸」型正面句式，避免句中帶 injury 字眼被誤判為利空
  if(/after recovering|recovered from|back from injury|returns from injury|starting lineup.*injury|starts.*after.*injury|fit again|fit for|fit to (play|feature|start)|ruled fit|declared fit|passed (a )?(late )?fit|cleared to play|in contention|expected to (start|feature|play)|back in training|boost|fully recovered/.test(t))return 6;
  if(/ruled out|acl|achilles|surgery|tear|fracture|out of the world cup|out for the/.test(t))return -15;
  if(/injur|doubt|blow|sidelined|strain|hamstring|suspend|banned|withdraw|sacked|crisis|illness|will miss|misses/.test(t))return -10;
  if(/returns|return to training/.test(t))return 6;
  return 0;
}
function mentionedPlayers(t){
  const x=' '+norm(t)+' '; const out=[];
  TEAMS.forEach((tm,i)=>{ playersOf(i).forEach((p,pi)=>{
    const ln=norm(latinName(p[0])); if(ln&&x.includes(' '+ln+' '))out.push([i,pi,p[0]]);
  });});
  return out.slice(0,4);
}
function detectTeam(t){
  const x=' '+norm(t)+' ';
  const mp=mentionedPlayers(t);
  if(mp.length)return mp[0][0];
  // 取「最早出現在文中」的隊名（通常是新聞主詞），而非別名表順序
  let best=-1,pos=1e9;
  for(const k in ALIAS){ const i=x.indexOf(' '+k+' '); if(i>=0&&i<pos){pos=i;best=ALIAS[k];} }
  return best;
}
function newsRelevant(txt,delta,players){
  // 只留「會動到模型參數」的新聞：已偵測到傷病/停賽/回歸/換帥(delta≠0)，或涉及陣容/紀律
  if(delta!==0)return true;
  const t=txt.toLowerCase();
  if(/squad|line-?up|starting xi|starting line|named in|call-?up|called up|roster|left out|dropped|axed|recall|benched|rotation|race to be fit|fit to|fitness|doubtful|in doubt|in contention|red card|suspen|knock|return to training|set to (start|return|feature)|available for|ruled in/.test(t))return true;
  // 提及主力球員且帶傷病/狀態語境
  if(players&&players.length&&/injur|fit|doubt|miss|out|start|bench|recover|return|knock|sharp/.test(t))return true;
  return false;
}
async function fetchDailyNews(silent){
  try{
    const j=await(await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/news?limit=50')).json();
    const seen=new Set(S.seenNews||[]);
    const exist=new Set(S.news.map(n=>n.srcId).filter(Boolean));
    const have=new Set(S.pending.map(p=>p.id));
    const fresh=(j.articles||[]).filter(a=>{
      const ts=new Date(a.published||0).getTime();
      return Date.now()-ts<4*86400e3; // 只看 4 天內
    }).map(a=>{
      const id=String(a.dataSourceIdentifier||a.id||a.headline);
      const txt=(a.headline||'')+' '+(a.description||'');
      const players=mentionedPlayers(txt), delta=suggestDelta(txt);
      return {id,h:a.headline||'',d:a.description||'',pub:(a.published||'').slice(5,10).replace('-','/'),
        team:detectTeam(txt),delta,players,_txt:txt};
    }).filter(p=>!seen.has(p.id)&&!exist.has(p.id)&&!have.has(p.id));
    const relevant=fresh.filter(p=>newsRelevant(p._txt,p.delta,p.players));
    relevant.forEach(p=>delete p._txt);
    const skipped=fresh.length-relevant.length;
    S.pending=relevant.concat(S.pending).slice(0,60); // 新的排前面、含翻譯的舊待審保留、上限 60
    pendingNews=S.pending;
    S.lastNewsTs=Date.now(); save();
    if(!silent){ render(); if(relevant.length||skipped)toast(`📡 ${relevant.length} 則相關新聞${skipped?`，略過 ${skipped} 則無關`:''}`); }
    else renderTabs();
  }catch(e){ if(!silent)alert('抓取失敗：請確認網路連線。'); }
}
function acceptPending(k){
  const p=pendingNews[k];
  if(p.team<0){alert('這則新聞無法自動判斷球隊，請先在下拉選單選擇。');return;}
  S.news.unshift({id:'e'+Math.random().toString(36).slice(2),srcId:p.id,t:p.team,
    title:p.h.slice(0,90),detail:p.d,delta:p.delta||0,on:true,custom:true});
  S.seenNews=(S.seenNews||[]).concat(p.id).slice(-300);
  pendingNews.splice(k,1); save(); render();
}
function ignorePending(k){
  S.seenNews=(S.seenNews||[]).concat(pendingNews[k].id).slice(-300);
  pendingNews.splice(k,1); save(); render();
}
function ignoreAllPending(){
  S.seenNews=(S.seenNews||[]).concat(pendingNews.map(p=>p.id)).slice(-300);
  S.pending=[]; pendingNews=S.pending; save(); render();
}
async function trZh(text){ // 免金鑰翻譯：Google gtx 為主、MyMemory 備援
  try{
    const u='https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q='+encodeURIComponent(text);
    const j=await(await fetch(u)).json();
    return j[0].map(s=>s[0]).join('');
  }catch(e){
    const j=await(await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text.slice(0,490))+'&langpair=en|zh-TW')).json();
    const t=j.responseData&&j.responseData.translatedText;
    if(t)return t;
    throw e;
  }
}
async function translateItem(p){
  if(p.zh)return;
  const h=await trZh(p.h);
  const d=p.d?await trZh(p.d):'';
  p.h=h||p.h; p.d=d||p.d; p.zh=1;
  save(); // 翻譯結果隨待審清單一起保存，重開 App 不會消失
}
async function translateOne(k,btn){
  btn.textContent='…';
  try{ await translateItem(pendingNews[k]); }catch(e){ alert('翻譯失敗：請確認網路。'); }
  render();
}
async function translateAllPending(btn){
  const todo=pendingNews.filter(p=>!p.zh);
  const total=todo.length; let done=0;
  const upd=()=>{ if(btn)btn.textContent=`🌐 翻譯中 ${done}/${total}…`; };
  upd();
  await Promise.all(Array.from({length:3},async()=>{ // 3 路並行
    while(todo.length){
      const p=todo.shift();
      try{ await translateItem(p); }catch(e){}
      done++; upd();
    }
  }));
  render();
}
async function translateNews(k,btn){ // 已納入清單的事後翻譯
  btn.textContent='…';
  try{
    const n=S.news[k];
    n.title=await trZh(n.title);
    if(n.detail)n.detail=await trZh(n.detail);
    save();
  }catch(e){ alert('翻譯失敗：請確認網路。'); }
  render();
}
function acceptAllPending(){ // 只納入「球隊已判斷＋影響≠0」的項目，其餘留待人工確認
  let added=0;
  for(let k=pendingNews.length-1;k>=0;k--){
    const p=pendingNews[k];
    if(p.team>=0&&p.delta!==0){
      S.news.unshift({id:'e'+Math.random().toString(36).slice(2),srcId:p.id,t:p.team,
        title:p.h.slice(0,90),detail:p.d,delta:p.delta,on:true,custom:true});
      S.seenNews=(S.seenNews||[]).concat(p.id);
      pendingNews.splice(k,1); added++;
    }
  }
  S.seenNews=S.seenNews.slice(-300);
  save(); render();
  alert(added?`已一鍵納入 ${added} 則有影響值的新聞；剩下 ${pendingNews.length} 則（無法判斷球隊或影響為 0）留待人工確認。`:'目前沒有「球隊已判斷且影響≠0」的待審項目，請逐則確認。');
}

/* ---------- 動態對陣圖（官方樹）---------- */
let brOverride={};
function advProb(x,y,m){ // x 在該場淘汰賽晉級的機率（依官方場館算主場/高原、平手後 PK 混合）
  const vi=KO_INFO[m]?KO_INFO[m][1]:-1;
  const ax=vi>=0?matchAdv(x,vi):0, ay=vi>=0?matchAdv(y,vi):0;
  const sm=styleMul(x,y);
  const r=predict(effElo(x)+ax, effElo(y)+ay,sm[0],sm[1]);
  return r.pW + r.pD*pkProb(x,y,r.we);
}
function buildBracketRounds(){
  const wMap={},rMap={},tList=[];
  "ABCDEFGHIJKL".split('').forEach(g=>{
    const tb=groupTable(g,true);
    wMap[g]=tb[0].i; rMap[g]=tb[1].i; tList.push(tb[2]);
  });
  tList.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||effElo(b.i)-effElo(a.i));
  const tMap={}; tList.slice(0,8).forEach(r=>{ tMap[TEAMS[r.i][2]]=r.i; });
  let cur=buildR32(wMap,rMap,tMap);
  const rounds=[];
  const fullFix=ROUND_MS[0].every(x=>S.koFix[x]); // 防呆：32強官方對陣要全部抓齊才套用，避免隊伍重複出現
  for(let r=0;;r++){
    cur=cur.map(p=>{ const f=S.koFix[p[2]]; return (f&&(r>0||fullFix))?[f[0],f[1],p[2],1]:p; }); // 官方對陣優先
    const ms=cur.map((p,i)=>{
      const pa=advProb(p[0],p[1],p[2]);
      const lk=S.koRes[p[2]]; // 官方賽果鎖定
      const ov=brOverride[r+'_'+i];
      const winner=(lk===p[0]||lk===p[1])?lk:((ov===p[0]||ov===p[1])?ov:(pa>=0.5?p[0]:p[1]));
      return {a:p[0],b:p[1],m:p[2],pa,winner,locked:lk===p[0]||lk===p[1],fixed:!!p[3]};
    });
    rounds.push(ms);
    if(ms.length===1)break;
    const nm=ROUND_MS[r+1], nxt=[];
    for(let i=0;i<ms.length;i+=2)nxt.push([ms[i].winner,ms[i+1].winner,nm[i/2]]);
    cur=nxt;
  }
  return rounds;
}
function pickWin(r,i,t){ brOverride[r+'_'+i]=t; render(); }
function resetBracket(){ brOverride={}; render(); }
function bracketHtml(){
  // 世界盃掛圖式：左半往右打、右半往左打、決賽置中；SVG 接線、冠軍路徑金色
  const rounds=buildBracketRounds();
  const champ=rounds[4][0].winner;
  const BW=172,BH=54,GX=30,PITCH=66,PAD=4,TOP=26;
  const colX=c=>PAD+c*(BW+GX);
  const HALF=[8,4,2,1];
  const yc=[[],[],[],[],[]];
  for(let i=0;i<8;i++)yc[0][i]=TOP+i*PITCH+BH/2;
  for(let r=1;r<4;r++)for(let i=0;i<HALF[r];i++)yc[r][i]=(yc[r-1][2*i]+yc[r-1][2*i+1])/2;
  yc[4][0]=yc[3][0];
  const W=colX(8)+BW+PAD, H=TOP+8*PITCH+PAD;
  // 佈局：每場 {m,r,i,x,y,left}
  const place=[];
  for(let r=0;r<4;r++)rounds[r].forEach((m,i)=>{
    const left=i<HALF[r], li=i%HALF[r];
    place.push({m,r,i,li,left,x:left?colX(r):colX(8-r),y:yc[r][li]});
  });
  place.push({m:rounds[4][0],r:4,i:0,li:0,left:true,x:colX(4),y:yc[4][0]});
  // SVG 接線（冠軍路徑金色高亮）
  let paths='';
  place.filter(p=>p.r<4).forEach(p=>{
    let sx,tx,ty;
    if(p.r===3){ ty=yc[4][0]; if(p.left){sx=p.x+BW;tx=colX(4);}else{sx=p.x;tx=colX(4)+BW;} }
    else{ const ni=Math.floor(p.li/2); ty=yc[p.r+1][ni];
      if(p.left){sx=p.x+BW;tx=colX(p.r+1);}else{sx=p.x;tx=colX(7-p.r)+BW;} }
    const mid=(sx+tx)/2, gold=p.m.winner===champ;
    paths+=`<path d="M${sx} ${p.y} H${mid} V${ty} H${tx}" fill="none" stroke="${gold?'rgba(251,191,36,.8)':'#27395c'}" stroke-width="${gold?2:1.3}"/>`;
  });
  // 比賽框
  let boxes='';
  const mbox=p=>{
    const m=p.m, inf=KO_INFO[m.m];
    const row=x=>`<div class="bkt ${m.winner===x?'win':'lose'}" ${m.locked?'style="cursor:default"':`onclick="pickWin(${p.r},${p.i},${x})"`}>
      <span>${TEAMS[x][5]} ${TEAMS[x][1]}</span><span class="pcv">${m.locked?(m.winner===x?'✓':'—'):Math.round((x===m.a?m.pa:1-m.pa)*100)+'%'}</span></div>`;
    const goldBox=p.r===4?'border-color:var(--gold);':'';
    return `<div class="bkm" style="left:${p.x}px;top:${p.y-BH/2}px;width:${BW}px;${goldBox}">
      <div class="bkh">${m.fixed?'🔒':''}M${m.m}｜${inf[0]} ${VENUES[inf[1]][0]}${VENUES[inf[1]][4]>=1400?'⛰':''}</div>${row(m.a)}${row(m.b)}</div>`;
  };
  place.forEach(p=>{ boxes+=mbox(p); });
  // 冠軍橫幅（決賽框正上方）
  boxes+=`<div class="bkchamp" style="left:${colX(4)}px;top:${yc[4][0]-BH/2-72}px;width:${BW}px">
    <div class="t">🏆</div><div class="n">${TEAMS[champ][5]} ${TEAMS[champ][1]}</div></div>`;
  // 欄位標題
  const LBL=['32 強','16 強','8 強','4 強','🏆 決賽','4 強','8 強','16 強','32 強'];
  let labels='';
  LBL.forEach((t,c)=>{ labels+=`<div class="bklab" style="left:${colX(c)}px;top:2px;width:${BW}px">${t}</div>`; });
  return `<div class="bk-wrap"><div class="bk" data-w="${W}" data-h="${H}" style="width:${W}px;height:${H}px">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${paths}</svg>${labels}${boxes}</div></div>`;
}
let bkZoom = 1.0;
function applyBkFit(){ // 縮放至全寬（一頁看完整棵樹）或指定縮放比例
  const wrap=document.querySelector('.bk-wrap'), bk=document.querySelector('.bk');
  if(!wrap||!bk)return;
  const W=parseFloat(bk.dataset.w), H=parseFloat(bk.dataset.h);
  if(bkFit){
    const sc=Math.min(1,(wrap.clientWidth-4)/W);
    bk.style.transform=`scale(${sc})`; bk.style.transformOrigin='0 0';
    wrap.style.height=(H*sc+6)+'px'; wrap.style.overflow='hidden';
    bkZoom = sc;
  }else{
    bk.style.transform=`scale(${bkZoom})`; bk.style.transformOrigin='0 0';
    wrap.style.height=(H*bkZoom+6)+'px'; wrap.style.overflow='auto';
  }
}
function zoomBracket(delta) {
  bkFit = false;
  bkZoom = Math.max(0.3, Math.min(2.0, bkZoom + delta));
  render();
}
function fitBracket() {
  bkFit = true;
  render();
}

function runSim(){
  const btn = document.getElementById('simBtn');
  const wrap = document.getElementById('simProgressWrap');
  const pctLabel = document.getElementById('simPct');
  const bar = document.getElementById('simBar');
  
  btn.disabled = true;
  wrap.style.display = 'flex';
  pctLabel.textContent = '0%';
  bar.style.width = '0%';
  
  const eff=TEAMS.map((t,i)=>effElo(i));
  const pkr=TEAMS.map((t,i)=>pkRate(i));
  const gkq=TEAMS.map((t,i)=>gkQuality(i));
  const attArr=TEAMS.map((t,i)=>attOf(i));
  const defArr=TEAMS.map((t,i)=>defOf(i));
  const N=S.settings.sims;
  const HIGHALT_List = Array.from(HIGHALT);

  try {
    const blob = new Blob([SIM_WORKER_CODE], {type: 'application/javascript'});
    const worker = new Worker(URL.createObjectURL(blob));

    worker.postMessage({
      TEAMS, MATCHES, VENUES, HIGHALT_List, DIASPORA, KO_DEF, T_SLOTS, ROUND_MS, KO_INFO, S, eff, pkr, gkq, attArr, defArr, N
    });
    
    worker.onmessage = function(e) {
      if (e.data.type === 'progress') {
        const pctVal = e.data.progress;
        pctLabel.textContent = pctVal + '%';
        bar.style.width = pctVal + '%';
      } else if (e.data.type === 'done') {
        simResult = { n: N, st: e.data.result };
        wrap.style.display = 'none';
        btn.disabled = false;
        worker.terminate();
        render();
      }
    };
    worker.onerror = function(err) {
      console.error("Worker error:", err);
      alert("模擬背景執行發生錯誤，改為單執行緒備援模擬。");
      btn.disabled = false;
      wrap.style.display = 'none';
      worker.terminate();
      runSimFallback();
    };
  } catch(err) {
    console.warn("Worker creation failed, falling back:", err);
    runSimFallback();
  }
}
function runSimFallback(){
  const N=S.settings.sims;
  const eff=TEAMS.map((t,i)=>effElo(i));
  const pkr=TEAMS.map((t,i)=>pkRate(i));
  const fullFix=ROUND_MS[0].every(x=>S.koFix[x]);
  const st=TEAMS.map(()=>({q32:0,q16:0,q8:0,q4:0,fin:0,champ:0}));
  const groups="ABCDEFGHIJKL".split('');
  const NSD=S.settings.simNoise!=null?S.settings.simNoise:45;
  const rho=S.settings.drawBoost||1.2, tg=S.settings.totalGoals;
  
  const gauss=()=>{ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); };
  const simMatch=(eA,eB,sA,sB)=>{
    sA=sA||1; sB=sB||1;
    const we=1/(1+Math.pow(10,-(eA-eB)/(S.settings.eloScale||600)));
    const weC=Math.min(0.94,Math.max(0.06,we)); // 同 predict：夾 we 以守恆總進球
    const lA=tg*weC*sA, lB=tg*(1-weC)*sB;
    const close=Math.exp(-Math.abs(eA-eB)/(S.settings.drawCloseness||350));
    const rhoEff=1+(rho-1)*close;
    const NG=9, pa=[Math.exp(-lA)], pb=[Math.exp(-lB)];
    for(let k=1;k<NG;k++){ pa.push(pa[k-1]*lA/k); pb.push(pb[k-1]*lB/k); }
    let tot=0;
    for(let i=0;i<NG;i++)for(let j=0;j<NG;j++)tot+=pa[i]*pb[j]*(i===j?rhoEff:1);
    let u=Math.random()*tot;
    for(let i=0;i<NG;i++)for(let j=0;j<NG;j++){ u-=pa[i]*pb[j]*(i===j?rhoEff:1); if(u<=0)return[i,j]; }
    return [0,0];
  };
  for(let s=0;s<N;s++){
    const ne=eff.map(e=>NSD?e+gauss()*NSD:e);
    const simScores = new Array(MATCHES.length);
    const rows={}; TEAMS.forEach((t,i)=>rows[i]={i,pts:0,gd:0,gf:0});
    MATCHES.forEach((m,idx)=>{
      const res=S.results[idx];
      let gh,ga;
      if(res&&!isNaN(res[0])&&!isNaN(res[1])){ gh=res[0];ga=res[1]; }
      else{ const sm=styleMul(m[2],m[3]); const sc=simMatch(ne[m[2]]+matchAdv(m[2],m[4]), ne[m[3]]+matchAdv(m[3],m[4]),sm[0],sm[1]); gh=sc[0]; ga=sc[1]; }
      simScores[idx] = [gh, ga];
      rows[m[2]].gf+=gh; rows[m[3]].gf+=ga;
      rows[m[2]].gd+=gh-ga; rows[m[3]].gd+=ga-gh;
      if(gh>ga)rows[m[2]].pts+=3; else if(gh<ga)rows[m[3]].pts+=3; else{rows[m[2]].pts++;rows[m[3]].pts++;}
    });
    const wMap={},rMap={},tArr=[];
    groups.forEach(g=>{
      const teamIdxs = [];
      TEAMS.forEach((t, i) => { if (t[2] === g) teamIdxs.push(i); });
      const sorted = sortGroup(teamIdxs, rows, simScores, MATCHES, ne);
      wMap[g]=sorted[0]; rMap[g]=sorted[1]; tArr.push(rows[sorted[2]]);
    });
    tArr.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||ne[b.i]-ne[a.i]||Math.random()-0.5);
    const tMap={}; tArr.slice(0,8).forEach(r=>{ tMap[TEAMS[r.i][2]]=r.i; });
    let cur=buildR32(wMap,rMap,tMap).map(p=>{ const f=fullFix?S.koFix[p[2]]:null; return f?[f[0],f[1],p[2]]:p; });
    cur.forEach(p=>{ st[p[0]].q32++; st[p[1]].q32++; });
    const koWin=(x,y,m)=>{
      const fx=S.koRes[m]; if(fx===x||fx===y)return fx;
      const vi=KO_INFO[m][1];
      const eX=ne[x]+matchAdv(x,vi), eY=ne[y]+matchAdv(y,vi);
      const sm=styleMul(x,y);
      const sc=simMatch(eX,eY,sm[0],sm[1]);
      if(sc[0]>sc[1])return x; if(sc[1]>sc[0])return y;
      const we=1/(1+Math.pow(10,-(eX-eY)/(S.settings.eloScale||600)));
      return Math.random()<pkProb(x,y,we)?x:y;
    };
    const stages=['q16','q8','q4','fin','champ'];
    for(let r=0;r<5;r++){
      const wn=cur.map(p=>koWin(p[0],p[1],p[2]));
      wn.forEach(i=>st[i][stages[r]]++);
      if(r===4)break;
      const nm=ROUND_MS[r+1], nxt=[];
      for(let i=0;i<wn.length;i+=2)nxt.push([wn[i],wn[i+1],nm[i/2]]);
      cur=nxt;
    }
  }
  simResult={n:N,st};
  render();
}

/* ---------- 備份匯出／匯入（使用者個人編輯的可攜資料檔）---------- */
function exportBackup(){
  try{
    const payload=Object.assign({_app:'wc2026_predictor',_ver:'v4.4',_exported:new Date().toISOString()},S);
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date(), pad=n=>String(n).padStart(2,'0');
    a.href=url; a.download=`世界盃推估器備份_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('📤 已匯出備份檔');
  }catch(e){ alert('匯出失敗：'+e.message); }
}
function importBackup(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data||!data.settings||!data.results||!Array.isArray(data.news)) throw new Error('不是有效的備份檔');
      if(!confirm('匯入將覆蓋目前所有編輯，確定？')){ input.value=''; return; }
      delete data._app; delete data._ver; delete data._exported;
      if(Array.isArray(data.news)) data.news=data.news.filter(n=>n&&typeof n.t==='number'&&n.t>=0&&n.t<TEAMS.length); // 過濾隊伍索引越界的新聞，避免匯入損壞備份後崩潰
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
      alert('✅ 匯入成功，將重新載入。');
      location.reload();
    }catch(e){ alert('匯入失敗：'+e.message+'\n請確認是本程式匯出的 .json 檔。'); input.value=''; }
  };
  r.readAsText(file);
}
